name: bamako_thrift
description: "Bamako Thrift – Marketplace de vêtements de seconde main."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  # ── UI ──────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  flutter_screenutil: ^5.9.0
  lottie: ^3.1.2

  # ── Navigation ──────────────────────────────────────────────────────────
  go_router: ^14.2.7

  # ── State Management ────────────────────────────────────────────────────
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # ── DI ──────────────────────────────────────────────────────────────────
  get_it: ^8.0.2
  injectable: ^2.4.4

  # ── Network ─────────────────────────────────────────────────────────────
  dio: ^5.7.0
  connectivity_plus: ^6.0.5

  # ── Firebase ────────────────────────────────────────────────────────────
  firebase_core: ^3.15.2
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # ── Storage ─────────────────────────────────────────────────────────────
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # ── Serialization ───────────────────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ── Utilities ───────────────────────────────────────────────────────────
  logger: ^2.4.0
  intl: ^0.19.0
  uuid: ^4.4.2
  path_provider: ^2.1.4
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # ── Code Generation ─────────────────────────────────────────────────────
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
